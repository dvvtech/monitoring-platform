services:
  analytics_api:
    image: ghcr.io/dvvtech/monitoring-platform:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Prod                 
    networks:
      - public-network5    
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:      
        - "traefik.enable=true"
        - "traefik.http.routers.portainer.rule=Host(`monitoring.cloud-platform.pro`)"
        - "traefik.http.routers.portainer.entrypoints=websecure"
        - "traefik.http.routers.portainer.tls.certresolver=letsencrypt"
        - "traefik.http.services.portainer.loadbalancer.server.port=9000"

networks:
  public-network5:
    external: true    